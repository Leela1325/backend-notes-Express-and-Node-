<div class="d-flex justify-content-between align-items-center p-3">
  <div class="d-flex align-items-center gap-3">
    <div
      class="bg-success bg-opacity-10 rounded-3 p-2 text-success d-flex align-items-center justify-content-center shadow-sm"
      style="width: 42px; height: 42px"
    >
      <i class="bi bi-graph-up-arrow text-black"></i>
    </div>
    <span class="h5">Analytics</span>
  </div>
  @if (selectedProduct) {
    <span class="badge bg-primary d-flex align-items-center gap-1"
      >{{ selectedProduct.name }}
      <i
        class="bi bi-x-circle-fill ms-1"
        style="cursor: pointer"
        (click)="clearProduct()"
      ></i>
    </span>
  }
  <div class="d-flex align-items-center position-relative gap-3">
    <div
      class="bg-success bg-opacity-10 rounded-circle p-1 text-success d-flex align-items-center justify-content-center shadow-sm position-absolute ms-2"
      style="height: 30px; aspect-ratio: 1/1"
    >
      <i class="bi bi-search text-secondary"></i>
    </div>
    <input
      type="text"
      class="form-control ps-5 rounded-pill searchInput"
      placeholder="Search product..."
      [(ngModel)]="productSearch"
      (input)="onSearchInput()"
      (blur)="closeDropdown()"
    />
    @if (isDropdownOpen && filteredProducts.length) {
      <div class="card position-absolute w-100 rounded-2 searchFilterCard">
        @for (product of filteredProducts; track product.id) {
          <div
            class="p-3 hover-bg border-bottom"
            (mousedown)="selectProduct(product)"
          >
            <div class="fw-medium text-dark">{{ product.name }}</div>
            @if (product.description) {
              <small class="text-muted d-block text-truncate">
                {{ product.description }}
              </small>
            }
          </div>
        }
      </div>
    }
  </div>
</div>
@if (selectedProduct) {
  <div class="mt-2 px-3 align-items-stretch">
    <app-product-performance [productId]="selectedProduct.id" />
  </div>
}
<div class="row mt-2 px-3 align-items-stretch">
  <div class="col">
    <div class="card h-100">
      <app-daily-sales-chart />
    </div>
  </div>
</div>
<div class="row mt-2 px-3 align-items-stretch">
  <div class="col-12">
    <div class="card p-3 h-100">
      <app-category-sales />
    </div>
  </div>
</div>
<div class="row mt-2 px-3 mb-2 align-items-stretch">
  <div class="col-md-8">
    <div class="card p-3">
      <app-treemap />
    </div>
  </div>
  <div class="col-md-4">
    <div class="card p-3 h-100">
      <app-bad-performance />
    </div>
  </div>
</div>
