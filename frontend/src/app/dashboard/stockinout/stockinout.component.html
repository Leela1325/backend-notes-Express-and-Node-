<div class="card h-100 border-0 shadow-sm" style="border-radius: 16px">
  <div class="card-body p-4 d-flex flex-column">
    <div class="d-flex justify-content-between align-items-start mb-4">
      <div>
        <h5 class="mb-1 fw-medium">Stock In vs Stock Out</h5>
        <p class="text-muted small mb-0">Last 7 days</p>
      </div>
      <div class="icon-box icon-box-stock">
        <i class="bi bi-arrow-left-right"></i>
      </div>
    </div>

    <div class="flex-grow-1">
      @if (isLoaded) {
        <apx-chart
          [series]="chartOptions.series"
          [chart]="chartOptions.chart"
          [plotOptions]="chartOptions.plotOptions"
          [dataLabels]="chartOptions.dataLabels"
          [stroke]="chartOptions.stroke"
          [grid]="chartOptions.grid"
          [yaxis]="chartOptions.yaxis"
          [xaxis]="chartOptions.xaxis"
          [colors]="chartOptions.colors"
          [tooltip]="chartOptions.tooltip"
          [legend]="chartOptions.legend"
          [responsive]="chartOptions.responsive">
        </apx-chart>
      } @else {
        <div class="h-100 d-flex flex-column align-items-center justify-content-center text-muted py-5">
          <i class="bi bi-bar-chart fs-1 mb-2 opacity-25"></i>
          <span class="fw-medium small mb-1">No chart data available</span>
          <span class="text-muted" style="font-size: 0.7rem;">Data will appear once loaded</span>
        </div>
      }
    </div>
  </div>
</div>
