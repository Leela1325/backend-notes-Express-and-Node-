<div class="card sales-card h-100 border-0 shadow-sm" >
  <div class="card-body p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div class=" d-flex flex-wrap gap-2 ">
        <h5 class=" mb-0 fw-medium">Sales</h5>
     
        @if(isloaded) {
          
        <span class=" small fw-medium date-stamp">
          {{ sales.date  | date : 'mediumDate' }}
        </span>
      }
      </div>
      <div class="icon-box">
        <i class="bi bi-currency-dollar"></i>
      </div>
    </div>
@if(isloaded)
{
    <div class="row text-center">
      
      <div class="col-6">
        <div class="text-secondary extra-small text-uppercase fw-semibold mb-4">Total Quantity</div>
        <h6 class="fw-medium mb-0 text-dark">{{ sales.totalQuantity }}</h6>
      </div>
      
      <div class="col-6 border-end">
        <div class="text-secondary extra-small text-uppercase fw-semibold mb-4">Total Revenue</div>
        <h6 class=" mb-0 text-dark " [class.smaller]="sales.totalSalesRevenue.toLocaleString().length > 7">
         ₹{{sales.totalSalesRevenue.toLocaleString('en-IN')}}
        </h6>
      </div>
    </div>
  }
  @else {
      <div class="flex-grow-1 d-flex flex-column align-items-center justify-content-center text-muted py-5">
        <i class="bi bi-inbox fs-1 mb-2 opacity-25"></i>
        <span class="fw-medium small">No data available</span>
      </div>
    }
  </div>

</div>
