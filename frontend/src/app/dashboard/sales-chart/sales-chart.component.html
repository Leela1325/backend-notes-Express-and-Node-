<div class="card sales-card border-0 shadow-sm mx-3">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h5 class="fw-medium text-dark mb-0">Revenue Overview</h5>
      </div>
      <div class="d-flex align-items-center gap-2">
        <input type="number"
               class="form-control form-control-sm revenue-days-input"
               [min]="1" [max]="30"
               [(ngModel)]="daysInput" />
        <button class="btn btn-sm go-btn text-white"
                (click)="onDaysChange()"
                [disabled]="!daysInput || daysInput < 1 || daysInput > 30">
          Go
        </button>
        <div class="icon-box p-3">
          <i class="bi bi-graph-up"></i>
        </div>
      </div>
    </div>

    <div id="chart" class="mt-2">
      @if (chartOptions.series[0].data.length > 0) {
        <apx-chart
          [series]="chartOptions.series"
          [chart]="chartOptions.chart"
          [xaxis]="chartOptions.xaxis"
          [stroke]="chartOptions.stroke"
          [dataLabels]="chartOptions.dataLabels"
          [yaxis]="chartOptions.yaxis"
          [colors]="chartOptions.colors">
        </apx-chart>
      } @else {
        <div class="d-flex flex-column align-items-center justify-content-center text-muted py-5">
          <i class="bi bi-bar-chart fs-1 mb-2 opacity-25"></i>
          <span class="fw-medium small mb-1">No chart data available</span>
          <span class="text-muted" style="font-size: 0.7rem;">Data will appear once loaded</span>
        </div>
      }
    </div>
  </div>
</div>
