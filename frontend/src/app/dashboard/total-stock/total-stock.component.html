<div class="card stock-card h-100 border-0 shadow-sm">
  <div class="card-body p-4 d-flex flex-column">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h5 class="card-title mb-0 fw-medium">Inventory Overview</h5>
      <div class="icon-box">
        <i class="bi bi-box-seam"></i>
      </div>
    </div>

    @if (isLoaded) {
      <div class="row text-center">
        <div class="col-6 border-end">
          <div class="text-secondary small text-uppercase fw-semibold mb-4">Total Products</div>
          <h6 class="fw-medium mb-0 text-dark">{{ products }}</h6>
        </div>

        <div class="col-6">
          <div class="text-secondary small text-uppercase fw-semibold mb-4">Total Quantity</div>
          <h6 class="fw-medium mb-0 text-dark">{{ quantity?.toLocaleString('en-IN') }}</h6>
        </div>
      </div>
    } @else {
      <div class="flex-grow-1 d-flex flex-column align-items-center justify-content-center text-muted py-5">
        <i class="bi bi-inbox fs-1 mb-2 opacity-25"></i>
        <span class="fw-medium small">No data available</span>
      </div>
    }
  </div>
</div>
