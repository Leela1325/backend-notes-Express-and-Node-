<div class="mobile-topbar">
  <button class="hamburger-btn" (click)="toggleSidebar()">
    <i class="bi bi-list"></i>
  </button>
  <span style="font-weight: 600; color: #16a34a;">INVENTORY SYSTEM</span>
</div>

<!-- Overlay: visible when sidebar is open on mobile -->
<div
  class="sidebar-overlay d-md-none"
  [class.active]="isSidebarOpen"
  (click)="toggleSidebar()"
></div>

<!-- Sidebar -->
<nav
  class="d-flex flex-column sidebar border-end p-2"
  [class.open]="isSidebarOpen"
>
  <div class="mb-2 text-start border-bottom p-3 d-flex justify-content-between align-items-center">
    <h3 class="mb-0">Warehouse</h3>
    <!-- Close button: visible only on mobile -->
    <button class="btn-close d-md-none" (click)="toggleSidebar()"></button>
  </div>

  @for (item of items; track $index) {
    <button
      #btn
      class="sidebar-btn border-0 py-2 ps-3 d-flex align-items-start gap-3"
      [routerLink]="item.link"
      routerLinkActive="selected"
      *ngIf="loginService.getRole() === 'admin'"
      [value]="item.feild"
      (click)="closeSidebarOnMobile()"
    >
      <i [class]="item.icon"></i>
      <span class="text-start">{{ item.feild }}</span>
    </button>
  }

  <button
    class="sidebar-btn border-0 py-2 ps-3 d-flex align-items-start gap-3"
    routerLink="sales"
    routerLinkActive="selected"
    *ngIf="loginService.getRole() === 'staff'"
    (click)="closeSidebarOnMobile()"
  >
    <i [class]="items[4].icon"></i>
    <span class="text-start">{{ items[4].feild }}</span>
  </button>

  <div class="d-flex flex-column align-items-center mt-auto border-top pt-2">
    <span style="font-size: larger">{{ name }}</span>
    <small>{{ email }}</small>
  </div>
  <button
    class="logout-btn border-0 py-2 gap-3 mt-2 mb-2"
    (click)="onClick()"
  >
    <i class="bi bi-box-arrow-right"></i><span> Logout</span>
  </button>
</nav>
