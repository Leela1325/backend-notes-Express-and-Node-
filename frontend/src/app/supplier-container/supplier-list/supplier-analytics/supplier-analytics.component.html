
<div class="container-fluid px-4 pt-3 pb-3">

  <div class="container-fluid px-3 px-sm-4 pt-3 pb-3">

  <header class="mb-4">
    <div class="d-flex align-items-center gap-1 gap-sm-2 mb-1 overflow-auto flex-nowrap pb-1" style="font-size: 0.65rem;">
      <span class="text-secondary text-uppercase fw-bold text-nowrap" style="font-size: inherit;">Zones</span>
      <i class="bi bi-chevron-right text-muted"></i>
      <span class="text-secondary text-uppercase fw-bold text-nowrap" style="font-size: inherit;">Categories</span>
      <i class="bi bi-chevron-right text-muted"></i>
      <span class="text-secondary text-uppercase fw-bold text-nowrap" style="font-size: inherit;">Suppliers</span>
      <i class="bi bi-chevron-right text-muted"></i>
      <span class="text-dark fw-bold text-uppercase text-nowrap" style="font-size: inherit;">Analytics</span>
    </div>
    <h6 class="fw-bold m-0 text-dark" style="font-size: clamp(0.85rem, 2.5vw, 1rem);">
      Supplier <span class="text-success">Analytics</span>
    </h6>
  </header>


</div>

  <div class="row g-3">
    <div class="col-12">
      <div class="card border-0 shadow-sm rounded-3 p-3">
<h6 class="fw-bold m-0 text-dark">
    Tree Map Of Each Supplier Purchase <span class="text-success"></span>
    </h6>
        <div *ngIf="isLoading" class="text-center py-5 text-muted">
          <div class="spinner-border spinner-border-sm text-success me-2"></div>
          <span class="small">Loading analytics...</span>
        </div>

        <div *ngIf="!isLoading && chartOptions">
          <apx-chart
            [series]="chartOptions.series"
            [chart]="chartOptions.chart"
           
        
            [colors]="chartOptions.colors">
          </apx-chart>
        </div>

        <div *ngIf="!isLoading && !chartOptions" class="text-center text-muted py-5">
          <i class="bi bi-bar-chart fs-3 d-block mb-2"></i>
          <p class="small">No purchase data available</p>
        </div>

      </div>
    </div>
  </div>

  <div class="row g-3 mt-2">
    <div class="col-12">
      <div class="card border-0 shadow-sm rounded-3 p-3">

       
        <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
          <h6 class="fw-bold m-0 text-dark">
            Supplier <span class="text-success">Purchase & History</span>
          </h6>
          <select
            class="form-select form-select-sm rounded-pill"
            style="max-width: 220px; font-size: 0.75rem;"
            [(ngModel)]="selectedSupplierId"
            (ngModelChange)="onSupplierChange()">
            <option *ngFor="let s of suppliers" [value]="s.id">{{ s.name }}</option>
          </select>
        </div>

     
        <div *ngIf="selectedSupplierInfo" class="d-flex gap-2 mb-3 flex-wrap">
          <span class="badge rounded-pill bg-success-subtle text-success border border-success-subtle px-3 py-1" style="font-size:0.75rem;">
            <i class="bi bi-star-fill me-1"></i> Rating: {{ round(selectedSupplierInfo.rating) }}/5
          </span>
         
        </div>

   
        <div *ngIf="isBarLoading" class="text-center py-5 text-muted">
          <div class="spinner-border spinner-border-sm text-success me-2"></div>
          <span class="small">Loading chart...</span>
        </div>

        <div [hidden]="isBarLoading">

      
          <div *ngIf="barChartOptions.series[0]?.data?.length === 0" class="text-center text-muted py-5">
            <i class="bi bi-bar-chart fs-3 d-block mb-2"></i>
            <p class="small">No purchase history for this supplier</p>
          </div>

        
          <div [hidden]="barChartOptions.series[0]?.data?.length === 0">
            <apx-chart
              [series]="barChartOptions.series"
              [chart]="barChartOptions.chart"
              [xaxis]="barChartOptions.xaxis"
              [yaxis]="barChartOptions.yaxis"
            
              [dataLabels]="barChartOptions.dataLabels"
              [colors]="barChartOptions.colors">
            </apx-chart>
          </div>

        </div>

      </div>
    </div>
  </div>

</div>
