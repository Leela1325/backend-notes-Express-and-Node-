<div class="container-fluid py-4 px-4">
  <div class="mx-auto">
   
    <div class="mb-4">
      <div class="d-flex align-items-center gap-2 mb-2">
        <span class="badge bg-success bg-opacity-10 text-success border border-success-subtle rounded-1 px-2 py-1 small">
          Module: Inventory
        </span>
        <span class="text-secondary fw-light">/</span>
        <span class="text-secondary small">Categories</span>
      </div>
     
      <h2 class="fw-bold text-dark h4 mb-1">Category Insights</h2>
      <p class="text-muted small mb-0">
        Browse through <span class="fw-bold text-success">{{ categories().length }}</span> distinct product groups.
      </p>
    </div>
 
    <div class="row g-4">
      @for (item of categories(); track item.id) {
        <div class="col-12 col-md-6 col-lg-4 col-xl-3">
          <app-category [category]="item" (categoryid)="onCategoryClick($event)"></app-category>
        </div>
      }@empty {
          <tr>
            <td colspan="7" class="text-center py-5">
              <div class="d-flex flex-column align-items-center opacity-50">
                <i class="bi bi-inbox fs-1 mb-2"></i>
                <p class="mb-0 fw-semibold">No Category found in this zone.</p>
                <small>Try adding a new category to get started.</small>
              </div>
            </td>
          </tr>
        }
    </div>
 
  </div>
</div>
