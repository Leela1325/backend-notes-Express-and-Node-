<div class="container-fluid py-4 px-4">
  <div class="mx-auto" >
    <div class="mb-4">
      <div class="d-flex align-items-center gap-2 mb-2">
        <span class="badge bg-success bg-opacity-10 text-success border border-success-subtle rounded-1 px-2 py-1 small">
          Module: Inventory
        </span>
        <span class="text-secondary fw-light">/</span>
        <span class="text-secondary small">Zones</span>
      </div>
      
      <h2 class="fw-bold text-dark h4 mb-1">Warehouse Infrastructure</h2>
      <p class="text-muted small mb-0">
        Reviewing <span class="fw-bold text-success">{{ zones().length }}</span> active storage zones. 
      </p>
    </div>

    <div class="row g-4">
      @for (z of zones(); track z.id) {
        <div class="col-12 col-md-6 col-lg-4 col-xl-3">
          <app-zone [zoneData]="z" (zoneId)="zoneNavigation($event)"></app-zone>
        </div>
      }@empty {
          <tr>
            <td colspan="7" class="text-center py-5">
              <div class="d-flex flex-column align-items-center opacity-50">
                <i class="bi bi-inbox fs-1 mb-2"></i>
                <p class="mb-0 fw-semibold">No Zones found.</p>
                <small>Try adding a new zone to get started.</small>
              </div>
            </td>
          </tr>
        }
    </div>

  </div>
</div>
